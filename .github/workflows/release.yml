name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.0.0). Leave empty to use the current HEAD.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build & package (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like 'refs/tags/*') { $tag = $ref.Substring(10) }
          elseif ($env:RELEASE_TAG) { $tag = $env:RELEASE_TAG }
          else { $tag = (git describe --tags --abbrev=0 2>$null) }
          if (-not $tag) { $tag = "v0.0.0-dev" }
          Write-Host "Resolved tag: $tag"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Build Tauri bundle (MSI + NSIS)
        working-directory: crates/wt-ui
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build --target x86_64-pc-windows-msvc --bundles msi nsis

      - name: List release artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse crates\wt-ui\target\release\bundle |
            Where-Object { -not $_.PSIsContainer } |
            Select-Object FullName, Length, LastWriteTime

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-${{ steps.version.outputs.tag }}
          path: |
            crates/wt-ui/target/release/bundle/**/*.msi
            crates/wt-ui/target/release/bundle/**/*.exe
            crates/wt-ui/target/release/wt-*.exe
          if-no-files-found: error
          retention-days: 30

  publish-github:
    name: Publish GitHub release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6.0.3

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: ls -la artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

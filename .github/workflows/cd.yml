name: CD

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'release'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      - name: Deploy to Netlify
        if: github.event_name == 'release'
        run: npm install -g netlify-cli && netlify deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Create Docker image
        if: github.event_name == 'release'
        run: |
          docker build -t visual-spider:${{ github.ref_name }} .
          docker tag visual-spider:${{ github.ref_name }} ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker tag visual-spider:${{ github.ref_name }} ghcr.io/${{ github.repository }}:latest
        env:
          DOCKER_BUILDKIT: 1

      - name: Push to GitHub Container Registry
        if: github.event_name == 'release'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:latest
